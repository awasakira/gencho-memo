<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>現調メモ v0.2</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      background: #f5f5f7;
      color: #111;
    }
    header {
      background: #111;
      color: white;
      padding: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    input, textarea, button {
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 10px;
      box-sizing: border-box;
    }
    input, textarea {
      width: 100%;
      margin: 6px 0 10px;
    }
    button {
      border: none;
      background: #111;
      color: white;
      margin: 4px 2px;
      cursor: pointer;
    }
    button.secondary { background: #666; }
    button.danger { background: #b00020; }
    button.small {
      padding: 7px 9px;
      font-size: 14px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .row input { flex: 1; }
    .item-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }
    .nums {
      background: #f0f0f2;
      border-radius: 10px;
      padding: 10px;
      min-height: 22px;
      word-break: break-word;
    }
    .total {
      font-weight: bold;
      font-size: 18px;
      margin-top: 8px;
    }
    .grand {
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>
<header>現調メモ v0.2</header>

<main>
  <div class="card">
    <label>案件名</label>
    <input id="projectName" placeholder="例：アクト様 さいたま市〇〇邸">

    <label>住所・メモ</label>
    <textarea id="projectMemo" rows="3" placeholder="住所、元請け、注意点など"></textarea>
  </div>

  <div class="card">
    <div class="grand">総合計：<span id="grandTotal">0</span> m</div>

    <label>追加する項目名</label>
    <div class="row">
      <input id="newItemName" placeholder="例：目地、サッシ、入隅">
      <button onclick="addItem()">追加</button>
    </div>

    <button class="secondary" onclick="exportText()">まとめをコピー</button>
    <button class="danger" onclick="resetAll()">全削除</button>
  </div>

  <div id="items"></div>
</main>

<script>
let data = {
  projectName: "",
  projectMemo: "",
  items: []
};

function saveData() {
  data.projectName = document.getElementById("projectName").value;
  data.projectMemo = document.getElementById("projectMemo").value;
  localStorage.setItem("genchoMemoV02", JSON.stringify(data));
  renderTotalOnly();
}

function loadData() {
  const saved = localStorage.getItem("genchoMemoV02");
  if (saved) {
    try { data = JSON.parse(saved); } catch(e) {}
  }
  document.getElementById("projectName").value = data.projectName || "";
  document.getElementById("projectMemo").value = data.projectMemo || "";
  document.getElementById("projectName").addEventListener("input", saveData);
  document.getElementById("projectMemo").addEventListener("input", saveData);
  render();
}

function addItem() {
  const input = document.getElementById("newItemName");
  const name = input.value.trim();
  if (!name) {
    alert("項目名を入れてください");
    return;
  }
  data.items.push({ name: name, numbers: [], memo: "" });
  input.value = "";
  saveData();
  render();
}

function renameItem(index) {
  const currentName = data.items[index].name;
  const newName = window.prompt("新しい項目名", currentName);
  if (!newName || !newName.trim()) return;
  data.items[index].name = newName.trim();
  saveData();
  render();
}

function deleteItem(index) {
  if (!confirm("この項目を削除しますか？")) return;
  data.items.splice(index, 1);
  saveData();
  render();
}

function addNumber(index) {
  const input = document.getElementById("numInput" + index);
  const raw = input.value.replace(",", ".");
  const value = parseFloat(raw);
  if (isNaN(value)) {
    alert("数字を入力してください");
    return;
  }
  data.items[index].numbers.push(value);
  input.value = "";
  saveData();
  render();
}

function deleteNumber(itemIndex, numIndex) {
  data.items[itemIndex].numbers.splice(numIndex, 1);
  saveData();
  render();
}

function updateMemo(index) {
  const memoEl = document.getElementById("memo" + index);
  if (memoEl) data.items[index].memo = memoEl.value;
  saveData();
}

function sum(arr) {
  return arr.reduce((a,b) => a + Number(b), 0);
}

function round(num) {
  return Math.round(num * 100) / 100;
}

function renderTotalOnly() {
  const grand = data.items.reduce((t, item) => t + sum(item.numbers), 0);
  document.getElementById("grandTotal").textContent = round(grand);
}

function render() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  data.items.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "card";

    const numbersHtml = item.numbers.length
      ? item.numbers.map((n, i) => `<button class="small secondary" onclick="deleteNumber(${index}, ${i})">${n} ✕</button>`).join(" ")
      : "まだ数字なし";

    card.innerHTML = `
      <div class="item-title">【${item.name}】</div>
      <button class="small secondary" onclick="renameItem(${index})">名前変更</button>
      <button class="small danger" onclick="deleteItem(${index})">項目削除</button>

      <div class="row">
        <input id="numInput${index}" type="number" step="0.1" inputmode="decimal" placeholder="例：5.4">
        <button onclick="addNumber(${index})">追加</button>
      </div>

      <div class="nums">${numbersHtml}</div>
      <div class="total">小計：${round(sum(item.numbers))} m</div>

      <label>項目メモ</label>
      <textarea id="memo${index}" rows="2" placeholder="注意点など" oninput="updateMemo(${index})">${item.memo || ""}</textarea>
    `;
    container.appendChild(card);
  });

  renderTotalOnly();
}

async function exportText() {
  saveData();

  let text = "";
  text += "案件名：" + (data.projectName || "") + "\n";
  text += "住所・メモ：" + (data.projectMemo || "") + "\n\n";

  data.items.forEach(item => {
    text += "【" + item.name + "】\n";
    text += "数字：" + item.numbers.join(" / ") + "\n";
    text += "小計：" + round(sum(item.numbers)) + "m\n";
    if (item.memo) text += "メモ：" + item.memo + "\n";
    text += "\n";
  });

  const grand = data.items.reduce((t, item) => t + sum(item.numbers), 0);
  text += "総合計：" + round(grand) + "m\n";

  try {
    await navigator.clipboard.writeText(text);
    alert("まとめをコピーしました");
  } catch(e) {
    const box = document.createElement("textarea");
    box.value = text;
    document.body.appendChild(box);
    box.select();
    document.execCommand("copy");
    document.body.removeChild(box);
    alert("まとめをコピーしました");
  }
}

function resetAll() {
  if (!confirm("全部消します。本当にいいですか？")) return;
  localStorage.removeItem("genchoMemoV02");
  data = { projectName: "", projectMemo: "", items: [] };
  document.getElementById("projectName").value = "";
  document.getElementById("projectMemo").value = "";
  document.getElementById("newItemName").value = "";
  render();
}

loadData();
</script>
</body>
</html>
